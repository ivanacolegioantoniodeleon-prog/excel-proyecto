		<Center><h1>Funcion Y</h1></Center>
	<section>
	<p>Use la función Y, una de las funciones lógicas, para determinar si todas las condiciones de una prueba son VERDADERAS.</p>
<p>= Y(A2>1,A2<100)

<br>Muestra VERDADERO si A2 es superior a 1 Y es inferior a 100, de otro modo, muestra FALSO.</br></p>
